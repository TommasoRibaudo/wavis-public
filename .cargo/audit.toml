# cargo-audit configuration
# Suppresses advisories for transitive dependencies we cannot directly fix.
# Review periodically and remove entries once upstream crates release fixes.

[advisories]
ignore = [
    # Marvin Attack timing sidechannel in `rsa` crate (transitive, via webrtc stack).
    # No patch available upstream yet. We don't use RSA directly.
    "RUSTSEC-2023-0071",

    # `async-std` discontinued — transitive dep, not used directly.
    "RUSTSEC-2025-0052",

    # `bincode` unmaintained — pulled in by webrtc-dtls → webrtc v0.11.
    # Cannot remove without an upstream webrtc release.
    "RUSTSEC-2025-0141",

    # `failure` deprecated + unsound __private_get_type_id__ — transitive dep,
    # not used directly. Safe unless downcasting with a manual Fail impl.
    "RUSTSEC-2020-0036",
    "RUSTSEC-2019-0036",

    # gtk-rs GTK3 bindings unmaintained — transitive deps from Tauri's Linux
    # webview support (webkit2gtk). Cannot migrate to GTK4 until Tauri does.
    "RUSTSEC-2024-0411",  # gdkwayland-sys
    "RUSTSEC-2024-0412",  # gdk
    "RUSTSEC-2024-0413",  # atk
    "RUSTSEC-2024-0414",  # gdkx11-sys
    "RUSTSEC-2024-0415",  # gtk
    "RUSTSEC-2024-0416",  # atk-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdk-sys
    "RUSTSEC-2024-0419",  # gtk3-macros
    "RUSTSEC-2024-0420",  # gtk-sys

    # glib VariantStrIter unsoundness — transitive via GTK3 bindings.
    # We don't use VariantStrIter directly.
    "RUSTSEC-2024-0429",

    # proc-macro-error unmaintained — transitive dep from derive macros.
    "RUSTSEC-2024-0370",

    # unic-* crates unmaintained — transitive deps, not used directly.
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident

    # fxhash unmaintained — transitive dep. Consider rustc-hash when upstream migrates.
    "RUSTSEC-2025-0057",
]
