# Codemagic desktop release workflows.
#
# Workflows:
# - desktop-linux-release:   Ubuntu AppImage (linux_x2)
# - desktop-windows-release: Windows NSIS installer (windows_x2)
# - desktop-macos-release:   macOS DMG (mac_mini_m2, ARM64)
#
# All workflows trigger on tags matching desktop-v*.
# All workflows publish artifacts to GitHub Releases on success.
#
# Required secrets — all stored in the "desktop-release" Codemagic environment group:
#
#   Shared (all platforms):
#     TAURI_SIGNING_PRIVATE_KEY  — contents of .local-secrets/wavis-tauri-updater.key
#
#   macOS only:
#     APPLE_CERTIFICATE          — base64-encoded Developer ID Application .p12 cert
#     APPLE_CERTIFICATE_PASSWORD — password for the .p12
#     APPLE_SIGNING_IDENTITY     — e.g. "Developer ID Application: Wavis (TEAMID)"
#     APPLE_ID                   — Apple ID email used for notarization
#     APPLE_APP_SPECIFIC_PASSWORD — app-specific password for notarization
#     APPLE_TEAM_ID              — Apple Developer team ID

workflows:
  desktop-linux-release:
    name: Desktop Linux Release
    instance_type: linux_x2
    max_build_duration: 120
    cache:
      cache_paths:
        - ~/.cargo/registry
        - ~/.cargo/git
        - target
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "desktop-v*"
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - desktop-release
      vars:
        WAVIS_GUI_DIR: clients/wavis-gui
    scripts:
      - name: Install Linux build dependencies
        script: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libclang-dev \
            libgbm-dev \
            libopus-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            patchelf \
            pkg-config \
            rpm
      - name: Install frontend dependencies
        script: |
          cd "$WAVIS_GUI_DIR"
          npm install
      - name: Install Rust toolchain
        script: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi

          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable
      - name: Verify toolchains
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          node --version
          npm --version
          rustc --version
          cargo --version
      - name: Run frontend tests
        script: |
          cd "$WAVIS_GUI_DIR"
          npm test
      - name: Build frontend
        script: |
          cd "$WAVIS_GUI_DIR"
          npm run build
      - name: Build signed Linux AppImage
        script: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for updater artifacts."
            exit 1
          fi

          export PATH="$HOME/.cargo/bin:$PATH"
          cd "$WAVIS_GUI_DIR"
          npm run tauri build -- --bundles appimage --verbose
      - name: List generated desktop artifacts
        script: |
          find target/release/bundle -maxdepth 3 -type f \
            \( -name "*.AppImage" -o -name "*.sig" -o -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" \) \
            -print
      - name: Publish to GitHub Releases
        script: |
          if [ -z "$CM_TAG" ]; then
            echo "Not a tag build, skipping GitHub Releases publish."
            exit 0
          fi
          export GH_TOKEN="$GITHUB_TOKEN"
          gh release create "$CM_TAG" --title "$CM_TAG" --generate-notes || true
          shopt -s nullglob
          files=(
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/appimage/*.AppImage.sig
            target/release/bundle/appimage/*.tar.gz
            target/release/bundle/appimage/*.tar.gz.sig
          )
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$CM_TAG" "${files[@]}" --clobber
          else
            echo "No artifacts found to upload."
            exit 1
          fi
      - name: Update latest.json for updater
        script: |
          if [ -z "$CM_TAG" ]; then exit 0; fi
          export GH_TOKEN="$GITHUB_TOKEN"
          sudo apt-get install -y jq || true
          VERSION="${CM_TAG#desktop-v}"
          REPO="TommasoRibaudo/wavis-public"
          shopt -s nullglob
          sig_files=(target/release/bundle/appimage/*.AppImage.sig)
          if [ ${#sig_files[@]} -eq 0 ]; then
            echo "No .sig file found, skipping latest.json update."
            exit 0
          fi
          appimage_files=(target/release/bundle/appimage/*.AppImage)
          ARTIFACT_NAME=$(basename "${appimage_files[0]}")
          ARTIFACT_URL="https://github.com/${REPO}/releases/download/${CM_TAG}/${ARTIFACT_NAME}"
          bash scripts/update-latest-json.sh "$CM_TAG" "$VERSION" "linux-x86_64" "$ARTIFACT_URL" "${sig_files[0]}"
    artifacts:
      - target/release/bundle/appimage/*.AppImage
      - target/release/bundle/appimage/*.AppImage.sig
      - target/release/bundle/appimage/*.tar.gz
      - target/release/bundle/appimage/*.tar.gz.sig
      - target/release/bundle/deb/*.deb
      - target/release/bundle/rpm/*.rpm

  desktop-windows-release:
    name: Desktop Windows Release
    instance_type: windows_x2
    max_build_duration: 120
    cache:
      cache_paths:
        - ~/.cargo/registry
        - ~/.cargo/git
        - target
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "desktop-v*"
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - desktop-release
      vars:
        WAVIS_GUI_DIR: clients/wavis-gui
    scripts:
      - name: Install Rust toolchain
        script: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "$env:TEMP\rustup-init.exe"
            & "$env:TEMP\rustup-init.exe" -y --default-toolchain stable --no-modify-path
          }
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          rustup default stable
      - name: Verify toolchains
        script: |
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          node --version
          npm --version
          rustc --version
          cargo --version
      - name: Install frontend dependencies
        script: |
          cd $env:WAVIS_GUI_DIR
          npm install
      - name: Run frontend tests
        script: |
          cd $env:WAVIS_GUI_DIR
          npm test
      - name: Build frontend
        script: |
          cd $env:WAVIS_GUI_DIR
          npm run build
      - name: Build signed Windows installer
        script: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            Write-Error "TAURI_SIGNING_PRIVATE_KEY is required for updater artifacts."
            exit 1
          }
          $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
          cd $env:WAVIS_GUI_DIR
          npm run tauri build -- --bundles nsis --verbose
      - name: List generated desktop artifacts
        script: |
          Get-ChildItem -Recurse target/release/bundle -Include *.exe,*.sig,*.nsis.zip,*.nsis.zip.sig | Select-Object FullName
      - name: Publish to GitHub Releases
        script: |
          if (-not $env:CM_TAG) {
            Write-Host "Not a tag build, skipping GitHub Releases publish."
            exit 0
          }
          $env:GH_TOKEN = $env:GITHUB_TOKEN
          gh release create $env:CM_TAG --title $env:CM_TAG --generate-notes
          if ($LASTEXITCODE -ne 0) { Write-Host "Release already exists, continuing." }
          $artifacts = Get-ChildItem `
            target/release/bundle/nsis/*.exe, `
            target/release/bundle/nsis/*.exe.sig, `
            target/release/bundle/nsis/*.nsis.zip, `
            target/release/bundle/nsis/*.nsis.zip.sig `
            -ErrorAction SilentlyContinue
          if ($artifacts) {
            gh release upload $env:CM_TAG $artifacts --clobber
          }
      - name: Update latest.json for updater
        script: |
          if (-not $env:CM_TAG) { exit 0 }
          $env:GH_TOKEN = $env:GITHUB_TOKEN
          $version = $env:CM_TAG -replace '^desktop-v', ''
          $repo = "TommasoRibaudo/wavis-public"

          $sigFiles = Get-ChildItem target/release/bundle/nsis/*-setup.exe.sig -ErrorAction SilentlyContinue
          if (-not $sigFiles) {
            Write-Host "No .sig file found, skipping latest.json update."
            exit 0
          }
          $signature = Get-Content $sigFiles[0].FullName -Raw
          $exeName = ($sigFiles[0].Name -replace '\.sig$', '')
          $url = "https://github.com/$repo/releases/download/$($env:CM_TAG)/$exeName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          # Try to download existing latest.json
          $existing = '{}'
          try {
            gh release download $env:CM_TAG --pattern "latest.json" --dir $env:TEMP --repo $repo --clobber 2>$null
            if (Test-Path "$env:TEMP/latest.json") {
              $existing = Get-Content "$env:TEMP/latest.json" -Raw
            }
          } catch {}

          $json = $existing | ConvertFrom-Json
          if (-not $json.platforms) { $json | Add-Member -NotePropertyName platforms -NotePropertyValue @{} -Force }
          $json.version = $version
          $json.pub_date = $pubDate
          if (-not $json.notes) { $json | Add-Member -NotePropertyName notes -NotePropertyValue "" -Force }
          $json.platforms | Add-Member -NotePropertyName "windows-x86_64" -NotePropertyValue @{url=$url; signature=$signature.Trim()} -Force

          $json | ConvertTo-Json -Depth 10 | Set-Content "$env:TEMP/latest.json" -Encoding UTF8
          Write-Host "Generated latest.json with platform windows-x86_64"
          Get-Content "$env:TEMP/latest.json"
          gh release upload $env:CM_TAG "$env:TEMP/latest.json" --repo $repo --clobber
    artifacts:
      - target/release/bundle/nsis/*.exe
      - target/release/bundle/nsis/*.exe.sig
      - target/release/bundle/nsis/*.nsis.zip
      - target/release/bundle/nsis/*.nsis.zip.sig

  desktop-macos-release:
    name: Desktop macOS Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    cache:
      cache_paths:
        - ~/.cargo/registry
        - ~/.cargo/git
        - target
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "desktop-v*"
          include: true
      cancel_previous_builds: true
    environment:
      groups:
        - desktop-release
      vars:
        WAVIS_GUI_DIR: clients/wavis-gui
    scripts:
      - name: Install macOS build dependencies
        script: |
          brew install automake libtool opus
      - name: Install Rust toolchain
        script: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable
      - name: Verify toolchains
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          node --version
          npm --version
          rustc --version
          cargo --version
      - name: Install frontend dependencies
        script: |
          cd "$WAVIS_GUI_DIR"
          npm install
      - name: Run frontend tests
        script: |
          cd "$WAVIS_GUI_DIR"
          npm test
      - name: Build frontend
        script: |
          cd "$WAVIS_GUI_DIR"
          npm run build
      - name: Build signed macOS DMG
        script: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is required for updater artifacts."
            exit 1
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          cd "$WAVIS_GUI_DIR"
          npm run tauri build -- --bundles app,dmg --verbose
      - name: List generated desktop artifacts
        script: |
          find target/release/bundle -type f \( -name "*.dmg" -o -name "*.sig" -o -name "*.tar.gz" -o -name "*.app" \) -print
      - name: Publish to GitHub Releases
        script: |
          if [ -z "$CM_TAG" ]; then
            echo "Not a tag build, skipping GitHub Releases publish."
            exit 0
          fi
          export GH_TOKEN="$GITHUB_TOKEN"
          gh release create "$CM_TAG" --title "$CM_TAG" --generate-notes || true
          shopt -s nullglob
          files=(
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app.tar.gz
            target/release/bundle/macos/*.app.tar.gz.sig
          )
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$CM_TAG" "${files[@]}" --clobber
          else
            echo "No artifacts found to upload."
            exit 1
          fi
      - name: Update latest.json for updater
        script: |
          if [ -z "$CM_TAG" ]; then exit 0; fi
          export GH_TOKEN="$GITHUB_TOKEN"
          VERSION="${CM_TAG#desktop-v}"
          REPO="TommasoRibaudo/wavis-public"
          shopt -s nullglob
          sig_files=(target/release/bundle/macos/*.app.tar.gz.sig)
          if [ ${#sig_files[@]} -eq 0 ]; then
            # Fallback: check for dmg sig if tar.gz sig doesn't exist
            sig_files=(target/release/bundle/dmg/*.dmg.sig)
          fi
          if [ ${#sig_files[@]} -eq 0 ]; then
            echo "No .sig file found, skipping latest.json update."
            exit 0
          fi
          # Find the corresponding updater artifact (prefer .app.tar.gz, fallback to .dmg)
          tar_files=(target/release/bundle/macos/*.app.tar.gz)
          if [ ${#tar_files[@]} -gt 0 ]; then
            ARTIFACT_NAME=$(basename "${tar_files[0]}")
          else
            dmg_files=(target/release/bundle/dmg/*.dmg)
            ARTIFACT_NAME=$(basename "${dmg_files[0]}")
          fi
          ARTIFACT_URL="https://github.com/${REPO}/releases/download/${CM_TAG}/${ARTIFACT_NAME}"
          bash scripts/update-latest-json.sh "$CM_TAG" "$VERSION" "darwin-aarch64" "$ARTIFACT_URL" "${sig_files[0]}"
    artifacts:
      - target/release/bundle/dmg/*.dmg
      - target/release/bundle/macos/*.app.tar.gz
      - target/release/bundle/macos/*.app.tar.gz.sig
