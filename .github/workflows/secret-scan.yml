name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: Detect secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for accurate diff scanning
          clean: true

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: ${{ github.event_name == 'pull_request' }}
          GITLEAKS_CONFIG: .gitleaks.toml
        # Fails if any secrets (API keys, tokens, credentials) are detected
        # in the commit diff or full repo history.
        # Requirements: 10.2, 10.3

      # Note: gitleaks-action@v2 uploads gitleaks-results.sarif.zip automatically.
      # No extra upload step needed.
