# Copy this file to tools/compat/machines.local.toml and edit for your lab.
# machines.local.toml is gitignored because it contains live IP addresses
# and private SSH key paths.
#
# RECOMMENDED: generate machines.local.toml automatically from Terraform outputs:
#   terraform -chdir=infrastructure/environments/dev apply
#   python tools/compat/gen-machines-local.py
#
# The Intel host runs one macOS version at a time (set by mac_intel_target_macos).
# Swap between Ventura and Big Sur with `terraform apply` — same host, no extra charge.
#
# AWS EC2 Mac instances:
# - SSH user  : ec2-user  (standard for all AWS macOS AMIs)
# - SSH key   : infrastructure/wavis-backend-dev-jey.pem  (same key as backend EC2)
# - Intel     : mac1.metal (x86_64)  /  ARM: mac2.metal (arm64)
# - See infrastructure/environments/dev/mac-compat.tf for Terraform resources

# ── AWS EC2 mac1.metal — currently loaded with macOS 13 Ventura ───────────
# (swap mac_intel_target_macos to "bigsur" to run Big Sur on the same host)
[[machines]]
name    = "mac-ventura-intel"
host    = "1.2.3.4"                             # terraform output mac_compat_intel_public_ip
user    = "ec2-user"
ssh_key = "infrastructure/wavis-backend-dev-jey.pem"
arch    = "x86_64"
macos   = "13.x"
notes   = "AWS EC2 mac1.metal — macOS 13 Ventura, Intel"
tiers   = ["t0", "t1", "t2", "t3"]

# ── AWS EC2 mac2.metal — macOS 26 Tahoe, ARM64 ────────────────────────────
# (enable_mac_compat_arm=true to provision this host)
[[machines]]
name    = "mac-arm"
host    = "1.2.3.5"                             # terraform output mac_compat_arm_public_ip
user    = "ec2-user"
ssh_key = "infrastructure/wavis-backend-dev-jey.pem"
arch    = "arm64"
macos   = "26.x"
notes   = "AWS EC2 mac2.metal — macOS 26 Tahoe, ARM64 baseline reference"
tiers   = ["t0", "t1", "t2", "t3"]

