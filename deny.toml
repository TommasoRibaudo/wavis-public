# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Used by `cargo deny check` in CI (.github/workflows/security-audit.yml)
# Requirements: 4.2, 4.3

[graph]
targets = []
all-features = true
exclude = ["wavis-gui"]

# --- Advisories -----------------------------------------------------------
[advisories]
# All vulnerability, unsound, and notice advisories now emit errors by default.
# Use `ignore` to suppress specific advisories if needed.
unmaintained = "workspace"
yanked = "warn"
ignore = [
    # Marvin Attack timing sidechannel in `rsa` (transitive, webrtc stack). No upstream patch.
    "RUSTSEC-2023-0071",
    # `async-std` discontinued — transitive dep, not used directly.
    "RUSTSEC-2025-0052",
    # `bincode` unmaintained — webrtc-dtls → webrtc v0.11 transitive dep.
    "RUSTSEC-2025-0141",
    # `failure` deprecated + unsound — transitive dep, not used directly.
    "RUSTSEC-2020-0036",
    "RUSTSEC-2019-0036",
    # `rand` <0.9.3 unsoundness requires a custom logger that calls rand::rng/thread_rng.
    # Remaining transitive rand 0.8 users are pinned by upstream crates such as webrtc/sqlx.
    "RUSTSEC-2026-0097",
]

# --- Licenses -------------------------------------------------------------
[licenses]
# All licenses are denied unless explicitly allowed (unlicensed/copyleft/deny fields removed).
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

# webrtc-audio-processing crates don't declare a license in their manifest
# but are BSD-3-Clause (WebRTC project license). Their COPYING file contains
# the license text. Using [[licenses.clarify]] with the COPYING file path.
[[licenses.clarify]]
name = "webrtc-audio-processing"
expression = "BSD-3-Clause"
license-files = [{ path = "COPYING", hash = 0xdeadbeef }]

[[licenses.clarify]]
name = "webrtc-audio-processing-sys"
expression = "BSD-3-Clause"
license-files = [{ path = "COPYING", hash = 0xdeadbeef }]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# --- Bans ------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "allow"

# --- Sources ---------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
